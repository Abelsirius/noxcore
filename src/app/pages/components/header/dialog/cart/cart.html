<div class="h-full bg-black flex flex-col text-white shadow-2xl border-l border-white/10">
  <!-- Header -->
  <div class="p-6 border-b border-white/10 flex items-center justify-between">
    <div class="flex items-center gap-3">
      <h2 class="text-xl font-black tracking-tighter uppercase glitch-text" data-text="CARRITO">CARRITO</h2>
      <span class="text-[10px] bg-red-600 text-white font-black px-2 py-0.5 rounded-full">{{cartService.cartCount()}}</span>
    </div>
    <button (click)="close()" class="text-gray-500 hover:text-white transition-colors">
      <i class="ti ti-x text-2xl"></i>
    </button>
  </div>

  <!-- Items List -->
  <div class="flex-1 overflow-y-auto p-6 space-y-6">
    <div *ngIf="cartService.cartItems().length === 0" class="flex flex-col items-center justify-center h-full text-center space-y-4">
      <i class="ti ti-shopping-cart-off text-6xl text-gray-800"></i>
      <p class="text-xs text-gray-500 tracking-widest uppercase">Tu carrito está vacío</p>
      <button (click)="close()" class="text-red-600 text-[10px] font-black tracking-widest uppercase hover:underline">Ir a la tienda</button>
    </div>

    <div *ngFor="let item of cartService.cartItems()" class="flex gap-4 group">
      <!-- Thumbnail -->
      <div class="w-20 h-24 bg-[#111] border border-white/5 overflow-hidden flex-shrink-0">
        <img [src]="item.product?.images?.[0]" class="w-full h-full object-cover">
      </div>
      
      <!-- Details -->
      <div class="flex-1 flex flex-col justify-between">
        <div class="space-y-0.5">
          <h3 class="text-xs font-bold uppercase tracking-tight">{{item.product?.name}}</h3>
          <p class="text-[10px] text-gray-500 uppercase tracking-widest">Talla: {{item.variant?.size}}</p>
          <p class="text-[10px] text-red-600 font-bold uppercase tracking-widest">S/. {{getItemPrice(item) | number:'1.2-2'}}</p>
        </div>
        
        <div class="flex items-center justify-between">
          <div class="flex items-center border border-white/10 text-[10px]">
            <button class="px-2 py-1 hover:bg-white/5 disabled:opacity-30" 
                    (click)="updateQuantity(item.variant_id, item.quantity, -1)" 
                    [disabled]="item.quantity <= 1 || isUpdating()">-</button>
            <span class="px-3 py-1 font-black">
              <i *ngIf="isUpdating()" class="ti ti-loader-2 animate-spin mr-1"></i>
              {{item.quantity}}
            </span>
            <button class="px-2 py-1 hover:bg-white/5 disabled:opacity-30" 
                    (click)="updateQuantity(item.variant_id, item.quantity, 1)"
                    [disabled]="isUpdating()">+</button>
          </div>
          <button (click)="removeItem(item.variant_id)" class="text-gray-700 hover:text-red-600 transition-colors">
            <i class="ti ti-trash text-sm"></i>
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- Footer / Checkout -->
  <div *ngIf="cartService.cartItems().length > 0" class="p-6 border-t border-white/10 bg-[#0a0a0a] space-y-4">
    <div class="flex items-center justify-between">
      <span class="text-[10px] text-gray-500 font-black tracking-widest uppercase">Subtotal</span>
      <span class="text-lg font-black tracking-tighter">S/. {{cartService.totalPrice() | number:'1.2-2'}}</span>
    </div>
    <p class="text-[9px] text-gray-600 uppercase tracking-widest text-center">Impuestos y envío calculados al finalizar</p>
    
    <button (click)="goToCheckout()" 
      class="w-full bg-white text-black font-black py-4 uppercase tracking-[0.2em] hover:bg-red-600 hover:text-white transition-all shadow-xl">
      FINALIZAR PEDIDO
    </button>
  </div>
</div>
